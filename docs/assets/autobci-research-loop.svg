<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AutoBCI research control plane architecture</title>
  <desc id="desc">AutoBCI owns the research control plane: human and lab context enter a frozen Program, Guard and Direction Queue govern sandboxed workers, fixed evaluator and ledger produce auditable outputs, while dashboard and mobile gateway remain observation and approval surfaces.</desc>
  <defs>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#e2e8f0" stroke-width="0.7"/>
    </pattern>
    <linearGradient id="controlBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0L11 5.5L0 11Z" fill="#3467c7"/>
    </marker>
    <marker id="arrowDark" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0L11 5.5L0 11Z" fill="#111827"/>
    </marker>
    <marker id="arrowTeal" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0L11 5.5L0 11Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowPink" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0L11 5.5L0 11Z" fill="#b84bc5"/>
    </marker>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:42px;font-weight:900;fill:#0f172a}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:600;fill:#475569}
      .section{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:900;letter-spacing:1.2px;fill:#64748b}
      .h1{font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:900;fill:#111827}
      .h2{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:850;fill:#111827}
      .h3{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:800;fill:#111827}
      .body{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:600;fill:#334155}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;fill:#475569}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:700;fill:#64748b}
      .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2.2;rx:22;filter:url(#shadow)}
      .control{fill:url(#controlBg);stroke:#316fd7;stroke-width:2.7;rx:28;filter:url(#shadow)}
      .gridFill{fill:url(#grid)}
      .blue{fill:#e8f2ff;stroke:#82a9e8;stroke-width:2.2;rx:14}
      .gold{fill:#fff6df;stroke:#f2b84b;stroke-width:2.2;rx:14}
      .rose{fill:#fff1f2;stroke:#ef5d72;stroke-width:2.2;rx:14}
      .green{fill:#ecf9ef;stroke:#4fb86b;stroke-width:2.2;rx:14}
      .teal{fill:#e8fbf7;stroke:#14a391;stroke-width:2.2;rx:14}
      .purple{fill:#f4e7ff;stroke:#b16eea;stroke-width:2.2;rx:14}
      .orange{fill:#fff0de;stroke:#fb923c;stroke-width:2.2;rx:14}
      .surface{fill:#fff5fc;stroke:#d16ad4;stroke-width:2.2;rx:16}
      .remoteSurface{fill:#eef6ff;stroke:#6d92e6;stroke-width:2.2;rx:16}
      .worker{fill:#ffffff;stroke:#d8e2ef;stroke-width:2;rx:18}
      .flowBlue{fill:none;stroke:#3467c7;stroke-width:2.6;marker-end:url(#arrowBlue)}
      .flowDark{fill:none;stroke:#111827;stroke-width:2.2;marker-end:url(#arrowDark)}
      .flowTeal{fill:none;stroke:#0f766e;stroke-width:2.4;marker-end:url(#arrowTeal)}
      .flowPink{fill:none;stroke:#b84bc5;stroke-width:2.4;marker-end:url(#arrowPink)}
      .dashBlue{fill:none;stroke:#6d92e6;stroke-width:2.3;stroke-dasharray:10 9;marker-end:url(#arrowBlue)}
      .dashNoArrow{fill:none;stroke:#6d92e6;stroke-width:2.3;stroke-dasharray:10 9}
      .chip{fill:#ffffff;stroke:#d8e2ef;stroke-width:1.5;rx:9}
      .logoRing{fill:#ffffff;stroke:#dbe4ef;stroke-width:1.8}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#fbfdff"/>
  <text x="52" y="64" class="title">AutoBCI Research Control Plane</text>
  <text x="54" y="94" class="subtitle">External coding agents do the work. AutoBCI owns the research contract, guardrails, evaluator, ledger, and promotion boundary.</text>

  <!-- input column -->
  <text x="70" y="146" class="section">INPUTS</text>
  <rect x="44" y="168" width="270" height="106" class="panel"/>
  <circle cx="91" cy="221" r="28" fill="none" stroke="#3467c7" stroke-width="4"/>
  <circle cx="91" cy="211" r="9" fill="none" stroke="#3467c7" stroke-width="4"/>
  <path d="M68 241C73 229 82 224 91 224C100 224 109 229 114 241" fill="none" stroke="#3467c7" stroke-width="4"/>
  <text x="136" y="209" class="h2">Human Gate</text>
  <text x="136" y="236" class="body">purpose / budget</text>
  <text x="136" y="256" class="body">promotion decision</text>

  <rect x="44" y="310" width="270" height="140" class="panel"/>
  <text x="76" y="350" class="h2">Lab Context</text>
  <rect x="76" y="374" width="88" height="28" class="blue"/>
  <text x="95" y="393" class="small">dataset</text>
  <rect x="174" y="374" width="94" height="28" class="gold"/>
  <text x="197" y="393" class="small">repo</text>
  <rect x="76" y="414" width="88" height="28" class="purple"/>
  <text x="94" y="433" class="small">runner</text>
  <rect x="174" y="414" width="94" height="28" class="green"/>
  <text x="194" y="433" class="small">metric</text>

  <rect x="44" y="486" width="270" height="158" class="panel"/>
  <text x="76" y="526" class="h2">Adapter Layer</text>
  <text x="76" y="554" class="body">local commands</text>
  <text x="76" y="578" class="body">remote worker config</text>
  <text x="76" y="602" class="body">provider / model route</text>
  <path d="M78 620H260" stroke="#cbd5e1" stroke-width="2"/>
  <text x="78" y="638" class="tiny">missing keys or data fail visibly</text>

  <!-- central control plane -->
  <rect x="360" y="128" width="846" height="666" class="control"/>
  <rect x="382" y="150" width="802" height="622" class="gridFill" opacity=".55"/>
  <text x="402" y="188" class="section">AUTOBCI CONTROLLED STATE</text>
  <text x="402" y="222" class="h1">Program, Guard, Queue, Sandbox, Evaluator, Ledger</text>

  <rect x="408" y="258" width="206" height="120" class="gold"/>
  <text x="438" y="296" class="h2">Program</text>
  <text x="438" y="322" class="body">frozen task</text>
  <text x="438" y="344" class="body">metric / data / bans</text>
  <rect x="438" y="354" width="52" height="18" class="chip"/>
  <text x="447" y="367" class="tiny">read</text>
  <rect x="498" y="354" width="72" height="18" class="chip"/>
  <text x="507" y="367" class="tiny">freeze</text>

  <rect x="654" y="258" width="184" height="120" class="rose"/>
  <text x="692" y="296" class="h2">Guard</text>
  <text x="686" y="322" class="body">scope gate</text>
  <text x="686" y="344" class="body">no evaluator edits</text>
  <text x="686" y="366" class="body">no target drift</text>

  <rect x="878" y="258" width="264" height="120" class="purple"/>
  <text x="918" y="296" class="h2">Direction Queue</text>
  <rect x="916" y="320" width="60" height="30" class="chip"/>
  <text x="932" y="340" class="small">sweep</text>
  <rect x="986" y="320" width="62" height="30" class="chip"/>
  <text x="1001" y="340" class="small">model</text>
  <rect x="1058" y="320" width="54" height="30" class="chip"/>
  <text x="1072" y="340" class="small">feat</text>
  <text x="918" y="366" class="body">ranked by current evidence</text>

  <path d="M314 221H408" class="flowBlue"/>
  <path d="M614 318H654" class="flowDark"/>
  <path d="M838 318H878" class="flowDark"/>
  <path d="M314 382H408V352" class="flowBlue"/>
  <path d="M314 564H384V488" class="flowBlue"/>

  <!-- sandbox belt -->
  <rect x="408" y="430" width="734" height="164" fill="#fffafa" stroke="#ef5d72" stroke-width="2.4" stroke-dasharray="10 8" rx="24"/>
  <text x="438" y="466" class="h2">Worker Sandbox Bus</text>
  <text x="438" y="492" class="body">bounded task packets only</text>
  <rect x="438" y="524" width="96" height="28" class="rose"/>
  <text x="451" y="543" class="tiny">Program read-only</text>

  <g transform="translate(604 500)">
    <rect x="-58" y="-50" width="116" height="102" class="worker"/>
    <circle cx="0" cy="-12" r="30" class="logoRing"/>
    <g transform="translate(-23 -35) scale(1.9)">
      <title>Codex worker represented by the OpenAI mark</title>
      <path fill="#111827" d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/>
    </g>
    <text x="-31" y="34" class="small">Codex</text>
  </g>

  <g transform="translate(762 500)">
    <rect x="-58" y="-50" width="116" height="102" class="worker"/>
    <circle cx="0" cy="-12" r="30" class="logoRing"/>
    <g transform="translate(-23 -35) scale(1.9)">
      <title>Claude worker</title>
      <path fill="#D97757" d="M4.709 15.955l4.72-2.647.08-.23-.08-.128H9.2l-.79-.048-2.698-.073-2.339-.097-2.266-.122-.571-.121L0 11.784l.055-.352.48-.321.686.06 1.52.103 2.278.158 1.652.097 2.449.255h.389l.055-.157-.134-.098-.103-.097-2.358-1.596-2.552-1.688-1.336-.972-.724-.491-.364-.462-.158-1.008.656-.722.881.06.225.061.893.686 1.908 1.476 2.491 1.833.365.304.145-.103.019-.073-.164-.274-1.355-2.446-1.446-2.49-.644-1.032-.17-.619a2.97 2.97 0 0 1-.104-.729L6.283.134 6.696 0l.996.134.42.364.62 1.414 1.002 2.229 1.555 3.03.456.898.243.832.091.255h.158V9.01l.128-1.706.237-2.095.23-2.695.08-.76.376-.91.747-.492.584.28.48.685-.067.444-.286 1.851-.559 2.903-.364 1.942h.212l.243-.242.985-1.306 1.652-2.064.73-.82.85-.904.547-.431h1.033l.76 1.129-.34 1.166-1.064 1.347-.881 1.142-1.264 1.7-.79 1.36.073.11.188-.02 2.856-.606 1.543-.28 1.841-.315.833.388.091.395-.328.807-1.969.486-2.309.462-3.439.813-.042.03.049.061 1.549.146.662.036h1.622l3.02.225.79.522.474.638-.079.485-1.215.62-1.64-.389-3.829-.91-1.312-.329h-.182v.11l1.093 1.068 2.006 1.81 2.509 2.33.127.578-.322.455-.34-.049-2.205-1.657-.851-.747-1.926-1.62h-.128v.17l.444.649 2.345 3.521.122 1.08-.17.353-.608.213-.668-.122-1.374-1.925-1.415-2.167-1.143-1.943-.14.08-.674 7.254-.316.37-.729.28-.607-.461-.322-.747.322-1.476.389-1.924.315-1.53.286-1.9.17-.632-.012-.042-.14.018-1.434 1.967-2.18 2.945-1.726 1.845-.414.164-.717-.37.067-.662.401-.589 2.388-3.036 1.44-1.882.93-1.086-.006-.158h-.055L4.132 18.56l-1.13.146-.487-.456.061-.746.231-.243 1.908-1.312-.006.006z"/>
    </g>
    <text x="-34" y="34" class="small">Claude</text>
  </g>

  <g transform="translate(920 500)">
    <rect x="-58" y="-50" width="116" height="102" class="worker"/>
    <circle cx="0" cy="-12" r="30" class="logoRing"/>
    <g transform="translate(-18 -35) scale(.15)">
      <title>OpenCode worker</title>
      <path d="M180 240H60V120H180V240Z" fill="#CFCECD"/>
      <path d="M180 60H60V240H180V60ZM240 300H0V0H240V300Z" fill="#211E1E"/>
    </g>
    <text x="-43" y="34" class="small">OpenCode</text>
  </g>

  <g transform="translate(1078 500)">
    <rect x="-58" y="-50" width="116" height="102" class="worker"/>
    <circle cx="0" cy="-12" r="30" class="logoRing"/>
    <path d="M-13 -24H13V2H-13Z" fill="#0f172a"/>
    <path d="M-5 -16H21V10H-5Z" fill="none" stroke="#0f172a" stroke-width="4"/>
    <text x="-44" y="34" class="small">Custom</text>
  </g>

  <path d="M1008 378V430" class="flowDark"/>
  <path d="M512 378V430" class="flowDark"/>
  <path d="M746 378V430" class="flowDark"/>

  <!-- evaluation and audit row -->
  <rect x="408" y="648" width="206" height="98" class="green"/>
  <text x="438" y="686" class="h2">Fixed Evaluator</text>
  <text x="438" y="712" class="body">primary metric locked</text>
  <text x="438" y="734" class="body">same protocol</text>

  <rect x="654" y="648" width="206" height="98" class="orange"/>
  <text x="684" y="686" class="h2">Promotion Rules</text>
  <text x="684" y="712" class="body">accept / reject</text>
  <text x="684" y="734" class="body">rollback / replan</text>

  <rect x="900" y="648" width="242" height="98" class="teal"/>
  <text x="930" y="686" class="h2">Ledger + Artifacts</text>
  <text x="930" y="712" class="body">events.jsonl / result.json</text>
  <text x="930" y="734" class="body">diff / stdout / judgment</text>

  <path d="M762 594V648" class="flowDark"/>
  <path d="M614 697H654" class="flowDark"/>
  <path d="M860 697H900" class="flowDark"/>
  <path d="M1021 648V610C1021 610 1021 610 1021 610H1021" class="dashNoArrow"/>
  <path d="M1021 648C1095 596 1132 532 1142 460C1152 388 1118 356 1142 318" class="dashBlue"/>
  <path d="M1142 318H878" class="dashBlue"/>

  <!-- outputs column -->
  <text x="1260" y="146" class="section">OBSERVE / APPROVE SURFACES</text>
  <rect x="1240" y="168" width="306" height="318" class="surface"/>
  <g transform="translate(1350 202) scale(2.4)">
    <title>Report surface icon</title>
    <path fill="#D97757" d="M4.709 15.955l4.72-2.647.08-.23-.08-.128H9.2l-.79-.048-2.698-.073-2.339-.097-2.266-.122-.571-.121L0 11.784l.055-.352.48-.321.686.06 1.52.103 2.278.158 1.652.097 2.449.255h.389l.055-.157-.134-.098-.103-.097-2.358-1.596-2.552-1.688-1.336-.972-.724-.491-.364-.462-.158-1.008.656-.722.881.06.225.061.893.686 1.908 1.476 2.491 1.833.365.304.145-.103.019-.073-.164-.274-1.355-2.446-1.446-2.49-.644-1.032-.17-.619a2.97 2.97 0 0 1-.104-.729L6.283.134 6.696 0l.996.134.42.364.62 1.414 1.002 2.229 1.555 3.03.456.898.243.832.091.255h.158V9.01l.128-1.706.237-2.095.23-2.695.08-.76.376-.91.747-.492.584.28.48.685-.067.444-.286 1.851-.559 2.903-.364 1.942h.212l.243-.242.985-1.306 1.652-2.064.73-.82.85-.904.547-.431h1.033l.76 1.129-.34 1.166-1.064 1.347-.881 1.142-1.264 1.7-.79 1.36.073.11.188-.02 2.856-.606 1.543-.28 1.841-.315.833.388.091.395-.328.807-1.969.486-2.309.462-3.439.813-.042.03.049.061 1.549.146.662.036h1.622l3.02.225.79.522.474.638-.079.485-1.215.62-1.64-.389-3.829-.91-1.312-.329h-.182v.11l1.093 1.068 2.006 1.81 2.509 2.33.127.578-.322.455-.34-.049-2.205-1.657-.851-.747-1.926-1.62h-.128v.17l.444.649 2.345 3.521.122 1.08-.17.353-.608.213-.668-.122-1.374-1.925-1.415-2.167-1.143-1.943-.14.08-.674 7.254-.316.37-.729.28-.607-.461-.322-.747.322-1.476.389-1.924.315-1.53.286-1.9.17-.632-.012-.042-.14.018-1.434 1.967-2.18 2.945-1.726 1.845-.414.164-.717-.37.067-.662.401-.589 2.388-3.036 1.44-1.882.93-1.086-.006-.158h-.055L4.132 18.56l-1.13.146-.487-.456.061-.746.231-.243 1.908-1.312-.006.006z"/>
  </g>
  <text x="1312" y="292" class="h2">Dashboard</text>
  <text x="1304" y="318" class="body">state projection</text>
  <rect x="1282" y="350" width="222" height="54" class="blue"/>
  <text x="1336" y="384" class="h3">Run Timeline</text>
  <rect x="1282" y="426" width="222" height="54" class="purple"/>
  <text x="1324" y="460" class="h3">Latest Report</text>

  <rect x="1240" y="506" width="306" height="138" class="remoteSurface"/>
  <rect x="1294" y="530" width="54" height="80" fill="#ffffff" stroke="#3467c7" stroke-width="3" rx="12"/>
  <rect x="1308" y="540" width="26" height="48" fill="#dbeafe" stroke="#8db1e5" stroke-width="1.5" rx="3"/>
  <circle cx="1321" cy="600" r="4" fill="#3467c7"/>
  <text x="1372" y="548" class="h2">Mobile Gateway</text>
  <text x="1372" y="574" class="body">headless CLI adapter</text>
  <text x="1372" y="596" class="body">status + approval only</text>
  <text x="1372" y="620" class="tiny">phone / webhook / bot</text>

  <path d="M1142 697H1240" class="flowTeal"/>
  <path d="M1240 540H1188V697" class="dashNoArrow"/>
  <path d="M1240 408H1188V318H1142" class="dashBlue"/>
  <path d="M900 746C954 790 1064 806 1176 764C1252 735 1308 682 1321 610" class="dashBlue"/>

  <!-- bottom invariants -->
  <rect x="68" y="792" width="1470" height="70" fill="#ffffff" stroke="#d8e2ef" stroke-width="2" rx="20"/>
  <text x="96" y="820" class="section">THREE NON-NEGOTIABLES</text>
  <rect x="330" y="812" width="270" height="32" class="gold"/>
  <text x="378" y="834" class="small">Program frozen: task cannot drift</text>
  <rect x="668" y="812" width="286" height="32" class="green"/>
  <text x="710" y="834" class="small">Evaluator fixed: metric cannot move</text>
  <rect x="1022" y="812" width="316" height="32" class="rose"/>
  <text x="1060" y="834" class="small">Sandbox isolated: workers cannot pollute truth</text>
</svg>
