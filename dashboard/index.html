<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoBCI Harness</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --ink: #17202a;
      --muted: #69727d;
      --line: #d9dee5;
      --panel: #ffffff;
      --accent: #1b6b8f;
      --ok: #1b7f5f;
      --warn: #a35f00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1, h2, p { margin: 0; }
    h1 { font-size: 24px; line-height: 1.25; letter-spacing: 0; }
    header p { margin-top: 8px; color: var(--muted); }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 22px auto 40px;
      display: grid;
      gap: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }
    h2 { font-size: 15px; line-height: 1.3; margin-bottom: 12px; }
    dl {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0;
    }
    dt { color: var(--muted); }
    dd { margin: 0; overflow-wrap: anywhere; }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e9f3f0;
      color: var(--ok);
      font-size: 13px;
      font-weight: 650;
    }
    .status.warn { background: #fff4df; color: var(--warn); }
    .events {
      display: grid;
      gap: 8px;
    }
    .event {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--accent);
    }
    @media (max-width: 760px) {
      header { padding: 22px 16px 16px; }
      main { width: calc(100vw - 24px); }
      .grid { grid-template-columns: 1fr; }
      dl { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AutoBCI Harness</h1>
    <p>本机研究控制面：Goal、Perp、Research Tree 和 headless runtime 状态。</p>
  </header>
  <main>
    <div class="grid">
      <section>
        <h2>Runtime</h2>
        <dl id="runtime"></dl>
      </section>
      <section>
        <h2>Goal</h2>
        <dl id="goal"></dl>
      </section>
      <section>
        <h2>Perp</h2>
        <dl id="perp"></dl>
      </section>
      <section>
        <h2>Research Tree</h2>
        <dl id="tree"></dl>
      </section>
    </div>
    <section>
      <h2>Recent Events</h2>
      <div id="events" class="events"></div>
    </section>
  </main>
  <script>
    const text = (value, fallback = "-") => value === undefined || value === null || value === "" ? fallback : String(value);
    const byId = (id) => document.getElementById(id);
    function rows(target, items) {
      target.innerHTML = items.map(([key, value]) => `<dt>${key}</dt><dd>${value}</dd>`).join("");
    }
    function status(value) {
      const raw = text(value, "none");
      const warn = ["blocked", "missing", "failed", "stopped"].some((token) => raw.includes(token));
      return `<span class="status ${warn ? "warn" : ""}">${raw}</span>`;
    }
    async function refresh() {
      const response = await fetch("/api/status", { cache: "no-store" });
      const data = await response.json();
      const snapshot = data.status || {};
      const control = data.research_control || {};
      const tree = control.research_tree || {};
      const goal = control.goal || {};
      const perp = control.perp || {};
      const loop = data.research_loop || {};
      rows(byId("runtime"), [
        ["repo", `<code>${text(data.repo_root)}</code>`],
        ["agent", status(snapshot.agent_status || "idle")],
        ["loop", status(loop.phase || loop.execution_status || "idle")],
        ["dashboard", text(new Date().toLocaleTimeString())]
      ]);
      rows(byId("goal"), [
        ["status", status(goal.status || "none")],
        ["objective", text(goal.objective)],
        ["success", text(goal.success_check)],
        ["updated", text(goal.updated_at)]
      ]);
      rows(byId("perp"), [
        ["status", status(perp.status || "none")],
        ["objective", text(perp.objective)],
        ["cadence", text(perp.cadence)],
        ["updated", text(perp.updated_at)]
      ]);
      rows(byId("tree"), [
        ["nodes", text((tree.nodes || []).length, "0")],
        ["edges", text((tree.edges || []).length, "0")],
        ["state", `<code>${text(tree.state_path)}</code>`],
        ["events", `<code>${text(tree.events_path)}</code>`]
      ]);
      const events = control.recent_events || [];
      byId("events").innerHTML = events.length
        ? events.slice(-12).reverse().map((item) => `<div class="event"><strong>${text(item.event_type)}</strong> · ${text(item.summary)}<br/><code>${text(item.recorded_at)}</code></div>`).join("")
        : "<div class=\"event\">暂无事件。</div>";
    }
    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
